name: Android CI (APK)

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" \
            "platforms;android-35" \
            "build-tools;34.0.0" \
            "ndk;25.2.9519653" \
            "cmdline-tools;latest"

      - name: Configure local.properties
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          cat local.properties

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build Java components (optional)
        run: ./gradlew :forge_installer:jar :arc_dns_injector:jar :jre_lwjgl3glfw:jar --no-daemon --stacktrace

      - name: Build Android APK (fullDebug)
        run: ./gradlew :app_pojavlauncher:assembleFullDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-artifacts
          path: |
            app_pojavlauncher/build/outputs/apk/**/*.apk
          if-no-files-found: error
